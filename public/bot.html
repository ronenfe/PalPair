<!DOCTYPE html>
<html>
<head>
  <title>Bot Video Stream</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <video id="botVideo" autoplay muted playsinline style="display:none"></video>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/ai-responses.js"></script>
  <script>
    const botId = new URLSearchParams(window.location.search).get('id') || '1';
    const botNames = ['Alice', 'Bob', 'Charlie', 'Diana', 'Eve'];
    const botName = `Bot-${botNames[parseInt(botId) - 1]}`;
    
    const video = document.getElementById('botVideo');
    
    // Load video file for this bot
    video.src = `/videos/bot${botId}.mp4`;
    video.loop = false; // ensure no looping
    video.play();
    
    // Get video stream from video element
    let stream = null;
    video.onloadedmetadata = () => {
      stream = video.captureStream();
      console.log(`[${botName}] Video stream captured`);
      initSocketAndWebRTC();
    };
    
    // Socket.IO connection
    let socket = null;
    let pc = null;
    let otherId = null;
    
    function initSocketAndWebRTC() {
      socket = io();
      
      console.log(`[${botName}] Initializing...`);
      
      socket.on('connect', () => {
        console.log(`[${botName}] Connected (${socket.id}) - Available for chat`);
        socket.emit('register-bot');
      });
      
      socket.on('matched', async ({ otherId: id, initiator }) => {
        console.log(`[${botName}] Matched with ${id}, initiator: ${initiator}`);
        otherId = id;
        // Restart video from beginning on each new match
        video.currentTime = 0;
        video.play();
        // Re-capture stream in case tracks ended
        stream = video.captureStream();
        await createPeerConnection(id, initiator);
      });
      
      socket.on('signal', async ({ from, data }) => {
        if (!pc) return;
        try {
          if (data.type === 'offer') {
            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('signal', { to: from, data: { type: 'answer', sdp: pc.localDescription } });
          } else if (data.type === 'answer') {
            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
          } else if (data.type === 'candidate') {
            await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
          }
        } catch (e) {
          console.error(`[${botName}] Signal error:`, e);
        }
      });
      
      socket.on('peer-disconnected', ({ id }) => {
        console.log(`[${botName}] Partner disconnected - Now available for new match`);
        if (pc) pc.close();
        pc = null;
        otherId = null;
        // Don't actively search - just wait to be matched
      });
      
      socket.on('peer-left', ({ id }) => {
        console.log(`[${botName}] Partner left - Now available for new match`);
        if (pc) pc.close();
        pc = null;
        otherId = null;
        // Don't actively search - just wait to be matched
      });

      // ── Public Stream: bot as broadcaster ──
      let isBotStreaming = false;
      const publicStreamPCs = new Map(); // viewerId → RTCPeerConnection

      socket.on('start-bot-stream', () => {
        if (isBotStreaming) return;
        isBotStreaming = true;
        // Restart video for fresh stream
        video.currentTime = 0;
        video.play();
        stream = video.captureStream();
        socket.emit('start-public-stream');
        console.log(`[${botName}] Started public stream`);
      });

      socket.on('stop-bot-stream', () => {
        if (!isBotStreaming) return;
        isBotStreaming = false;
        for (const [vid, vpc] of publicStreamPCs) {
          vpc.close();
        }
        publicStreamPCs.clear();
        socket.emit('stop-public-stream');
        console.log(`[${botName}] Stopped public stream`);
      });

      socket.on('public-stream-viewer-joined', async ({ viewerId }) => {
        if (!isBotStreaming) return;
        try {
          // Re-capture stream to ensure fresh tracks
          video.currentTime = 0;
          video.play();
          stream = video.captureStream();
          const viewerPC = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
          });
          publicStreamPCs.set(viewerId, viewerPC);

          viewerPC.onicecandidate = (e) => {
            if (e.candidate) {
              socket.emit('public-stream-signal', { to: viewerId, data: { type: 'candidate', candidate: e.candidate } });
            }
          };

          stream.getTracks().forEach(track => {
            viewerPC.addTrack(track, stream);
          });

          const offer = await viewerPC.createOffer();
          await viewerPC.setLocalDescription(offer);
          socket.emit('public-stream-signal', { to: viewerId, data: { type: 'offer', sdp: viewerPC.localDescription } });
          console.log(`[${botName}] Sending stream offer to viewer ${viewerId}`);
        } catch (e) {
          console.error(`[${botName}] Error creating stream for viewer:`, e);
        }
      });

      socket.on('public-stream-viewer-left', ({ viewerId }) => {
        const vpc = publicStreamPCs.get(viewerId);
        if (vpc) {
          vpc.close();
          publicStreamPCs.delete(viewerId);
          console.log(`[${botName}] Viewer ${viewerId} left stream`);
        }
      });

      socket.on('public-stream-signal', async ({ from, data }) => {
        // Handle signals from viewers (answers and ICE candidates)
        const vpc = publicStreamPCs.get(from);
        if (!vpc) return;
        try {
          if (data.type === 'answer') {
            await vpc.setRemoteDescription(new RTCSessionDescription(data.sdp));
          } else if (data.type === 'candidate') {
            await vpc.addIceCandidate(new RTCIceCandidate(data.candidate));
          }
        } catch (e) {
          console.warn(`[${botName}] Stream signal error:`, e.message);
        }
      });
      
      socket.on('chat-message', ({ from, text }) => {
        console.log(`[${botName}] Received message from ${from}: "${text}"`);
        // Request AI response from server after a small delay (looks more natural)
        setTimeout(async () => {
          try {
            const res = await fetch('/api/ai-response', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: text, botId, socketId: socket.id })
            });
            const data = await res.json();
            if (data.response) {
              console.log(`[${botName}] Sending response: "${data.response}"`);
              socket.emit('chat-message', { to: from, text: data.response });
            } else {
              console.log(`[${botName}] No response generated`);
            }
          } catch (err) {
            console.error(`[${botName}] Error getting AI response:`, err);
          }
        }, 500 + Math.random() * 1500);
      });
    }
    
    async function createPeerConnection(targetId, initiator) {
      pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });
      
      pc.onicecandidate = (e) => {
        if (e.candidate) {
          socket.emit('signal', { to: targetId, data: { type: 'candidate', candidate: e.candidate } });
        }
      };
      
      // Add video stream to peer connection
      stream.getTracks().forEach(track => {
        pc.addTrack(track, stream);
        console.log(`[${botName}] Added track:`, track.kind);
      });
      
      if (initiator) {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('signal', { to: targetId, data: { type: 'offer', sdp: pc.localDescription } });
      }
    }
  </script>
</body>
</html>
