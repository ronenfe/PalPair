      <!-- Public Chat Page (hidden initially) -->
      <div id="publicChatPage" style="display:none">

          <button id="goRandomBtn" class="go-random-btn" aria-label="Go random">🎥 Go Random</button>
          <div class="users-panel-group">

          </div>
        </div>
        <div class="room-layout">
          <div class="chat-container">
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-wrap">
              <input 
                id="chatInput" 
                type="text" 
                placeholder="Type a message..."
                data-i18n-placeholder="typeMessage" 
              />
              <button id="sendBtn" data-i18n="send">Send</button>
            </div>
          </div>
          <aside class="online-users-panel" id="onlineUsersPanel" aria-live="polite" style="display:none;">
            <h3 class="online-users-title">Connected users</h3>
            <ul id="onlineUsersList" class="online-users-list"></ul>
          </aside>
        </div>
      </div>

      <!-- Private Chat Page (hidden initially) -->

        <div class="videos
          <div id="status" class="status-text" aria-live="polite"></div>">          <div class="video-wrap">
            <video id="localVideo" autoplay muted playsinline></video>
          </div>
          <div class="video-wrap">
            <video id="remoteVideo" autoplay playsinline></video>
            <div id="remotePlaceholder" class="video-placeholder"></div>
            <div id="aiPartnerBadge" class="ai-partner-badge" aria-live="polite" style="display:none">🤖 AI Partner</div>
          </div>
          <div class="controls controls-overlay">
            <button id="nextBtn" class="control-btn control-primary" disabled aria-label="Find next partner" title="Find Next">⏭</button>
            <button id="reportBtn" class="control-btn control-danger" aria-label="Report concern" title="Report">⚑</button>
            <button id="chatToggleBtn" class="control-btn control-secondary" aria-label="Collapse chat" title="Collapse Chat">💬</button>
            <button id="stopRandomBtn" class="control-btn control-danger stop-bottom-right" aria-label="Stop random" title="Stop Random">⏹</button>
